[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NPM_FLAGS = "--prefer-offline"
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[dev]
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[context.production.environment]
  NODE_ENV = "production"
